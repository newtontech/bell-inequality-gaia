[review]
# Bell Inequality — Chained Belief Propagation
# Each phase inherits priors from the previous phase's posterior beliefs.

# ============================================================
# Phase 1: EPR Paradox (1935)
# All leaf node priors = 0.50 (initial state, no prior knowledge)
# ============================================================
[[review.phases]]
name = "Phase 1: EPR Paradox (1935)"

  # Leaf nodes: prior = 0.50
  [[review.phases.claims]]
  id = "p1_qm_precise"
  prior = 0.50
  prior_source = "leaf node, initial prior"

  [[review.phases.claims]]
  id = "p1_epr_criterion"
  prior = 0.50
  prior_source = "leaf node, initial prior"

  [[review.phases.claims]]
  id = "p1_bohr_complementarity"
  prior = 0.50
  prior_source = "leaf node, initial prior"

  [[review.phases.claims]]
  id = "p1_qm_incomplete"
  prior = 0.50
  prior_source = "derived, deduction from p1_epr_criterion + p1_qm_precise"

  [[review.phases.claims]]
  id = "p1_measurement_affects"
  prior = 0.50
  prior_source = "derived, deduction from p1_bohr_complementarity"

  [[review.phases.claims]]
  id = "p1_local_realism"
  prior = 0.50
  prior_source = "derived, entailment from p1_qm_incomplete"
  expected_belief = 0.65

  [[review.phases.claims]]
  id = "p1_hidden_variables"
  prior = 0.50
  prior_source = "derived, entailment from p1_qm_incomplete"
  expected_belief = 0.62

  [[review.phases.claims]]
  id = "p1_entanglement_real"
  prior = 0.50
  prior_source = "derived, weakening from contradiction"
  expected_belief = 0.55

